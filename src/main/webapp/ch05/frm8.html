<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<!-- action: 입력된 값들과 같이 요청(request)되는 주소 값 -->
<form action="frm8.jsp">
id: <input name="id" value="aaa"><br>
id: <input type="password" name="pwd" value="1234"><br>
<!-- 요청하는 어떠한 값을 넘길 때 hidden을 사용 -->
<input type="hidden" name="url"
value="https://n.news.naver.com/mnews/article/009/0005422770">
<input type="submit" value="로그인">
</form>
</body>
</html>
