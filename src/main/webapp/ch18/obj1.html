<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<script type="text/javascript">
	// Date 클래스로 객체를 생성
	// document(영역: 페이지본문), window(영역: 전체윈도우페이지), location(영역: URL)....
	// now는 참조 변수가 됐음. 그래서 Date 클래스를 쓸려면 now.~ 로 사용.
	var now = new Date();
	document.write(now.toString());
</script>
</body>
</html>
