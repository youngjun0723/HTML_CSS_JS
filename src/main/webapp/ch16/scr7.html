<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<script type="text/javascript">
	// 반복문: for, while, do-while
	a = 0;
	while(true) {
		document.write("오늘 뭐 먹지? <br>");
		if(a > 5) {
			break;
		}
		a++;
	}
	
	do{
		document.write("한 번은 실행되죠?");
	}while(false)
		
</script>
</body>
</html>
