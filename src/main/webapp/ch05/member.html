<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>

<form>
<table border="1">
<thead>
	<tr>
		<td colspan="3">회원가입</td>
	</tr>
</thead>
<tbody>
	<tr>
		<td>아이디</td>
		<td><input id="user_id"><input type="button" value="ID중복확인"></td>
		<td>아이디를 적어 주세요.</td>
	</tr>
	<tr>
		<td>비밀번호</td>
		<td><input type="password"></td>
		<td>비밀번호를 적어 주세요.</td>
	</tr>
	<!-- ?? -->
	<tr>
		<td>비밀번호 확인</td>
		<td><input type="password"></td>
		<td>비밀번호를 확인합니다.</td>
	</tr>
	<tr>
		<td>이름</td>
		<td><input name="user_name"></td>
		<td>이름을 적어 주세요.</td>
	</tr>
	<tr>
		<td>성별</td>
		<td>
				<label><input type="radio" name="man" value="boy">남</label>
				<label><input type="radio" name="woman" value="girl" >여</label>
		</td>
		<td>성별을 선택 하세요.</td>
	</tr>
	<tr>
		<td>생년월일</td>
		<td><input type="text"><small>ex)830815</small></td>
		<td>생년월일을 적어 주세요.</td>
	</tr>
	<tr>
		<td>Email</td>
		<td><input type="email" name="mail"></td>
		<td>이메일을 적어 주세요.</td>
	</tr>
	<tr>
		<td>우편번호</td>
		<td><input type="text"><input type="button" value="우편번호찾기"></td>
		<td>우편번호를 검색 하세요.</td>
	</tr>
	<tr>
		<td>주소</td>
		<td><input type="text"></td>
		<td>주소를 적어 주세요.</td>
	</tr>
	<tr>
		<td>취미</td>
		<td>
			<input type="checkbox" >인터넷
			<input type="checkbox" >여행
			<input type="checkbox" >게임
			<input type="checkbox" >영화
			<input type="checkbox" >운동
		</td>
		<td>취미를 선택 하세요.</td>
	</tr>
	<tr>
		<td>직업</td>
		<td><select name = "job">
		<option value="">직업을 선택하세요.</select>
		</td>
		<td>직업을 선택 하세요.</td>
	</tr>

	<tr>
		<td colspan="3" align="center">
			<input type="submit" value="회원가입">
			<input type="reset" value="다시쓰기">
			<input type="button" value="로그인">
		</td>
	</tr>

</tbody>
</table>
</form>

</body>
</html>
