<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<script type="text/javascript">
	// 중첩 for문
	for(i = 1; i < 3; i++) {
		for(j = 0; j < 2; j++) {
			document.write( i + "+" + j + "=" + (i+j) + "/////");
			// 문자열로 인식. 괄호를 줘서 우선순위를 부여.
			document.write( i + "+" + j + "=" + i + j + "<br>");
		}
	}
	
	
	// break, continue
	for(i = 1; i < 10; i++) {
		document.write(i + " ");
		if(i == 5){
			break;
		}
	}
	document.write("<br>");
	
	//문제) 1에서 10까지 짝수의 합을 구하시오.
	sum = 0;
	for(i = 1; i <= 10; i++) {
		if(i % 2 != 0) {
			continue;
		}
		sum += i;
	}
	document.write("<br>");
</script>
</body>
</html>
