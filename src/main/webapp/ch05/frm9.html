<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="css/form.css">
<title>레드향 주문하기</title>
</head>
<body>
<h1>레드향 주문하기</h1>
<form>
	<fieldset>
		<legend>레드향</legend>
		<ul>
			<li>
				<!-- prod: 주문상품을 눌렀을 때 입력칸에 가게끔 하기 위함. -->
				<label for="prod">주문상품</label>
				<input id="prod" value="상품용 3kg" readonly>
			</li>
			<li>
				<label for="user_name">이름</label>
				<input id="user_name" autofocus required>
			</li>
			<li>
				<label for="addr">배송 주소</label>
				<input id="addr" required>
			</li>
			<li>
				<label for="mail">이메일</label>
				<input type="email" name="mail" required>
			</li>
			<li>
				<label for="phone">연락처</label>
				<input type="tel" id="phone" required placeholder="'-' 빼고 입력해 주세요.(01012345678)">
			</li>
			<li>
				<label for="d_day"></label>
				<input type="date" id="d_day" ><small>(주문일로부터 최소 3일 이후)</small>
			</li>
		</ul>
	</fieldset>
<div>
<input type="submit" value="주문하기">
<input type="reset" value="취소하기">
</div>
</form>
</body>
</html>
