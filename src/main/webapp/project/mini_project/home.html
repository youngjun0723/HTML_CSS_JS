<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
      <div class="site-title" style="margin-bottom: 0; font-size: 24px;">Young Jun 🐾</div>
      <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 다크모드</button>
    </div>

    <nav style="border-bottom: none; margin-bottom: 0;">
      <ul id="topMenu" style="flex-direction: column; gap: 15px;">
        <li><a href="about.html" style="font-size: 18px; display: block; padding: 10px; background-color: #f8f9fa; border-radius: 8px;">About</a></li>
        <li><a href="like.html" style="font-size: 18px; display: block; padding: 10px; background-color: #f8f9fa; border-radius: 8px;">Like</a></li>
        <li><a href="skills.html" style="font-size: 18px; display: block; padding: 10px; background-color: #f8f9fa; border-radius: 8px;">Skills</a></li>
      </ul>
    </nav>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      
      const btn = document.getElementById('darkModeBtn');
      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('darkMode', 'on');
        btn.innerText = '☀️ 라이트모드';
      } else {
        localStorage.setItem('darkMode', 'off');
        btn.innerText = '🌙 다크모드';
      }
    }

    // 페이지 열릴 때 설정 불러오기
    if (localStorage.getItem('darkMode') === 'on') {
      document.body.classList.add('dark-mode');
      window.onload = function() {
        document.getElementById('darkModeBtn').innerText = '☀️ 라이트모드';
      }
    }
  </script>
</body>
</html>
