<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Like</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 15px;">
      <div class="site-title" style="margin-bottom: 0; font-size: 18px;">Like ❤️</div>
      <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 다크모드</button>
    </div>

    <nav style="margin-top: 15px;">
      <ul id="topMenu">
        <li><a href="home.html">🏠 Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="like.html" style="color: #6366f1; font-weight: bold;">Like</a></li>
        <li><a href="skills.html">Skills</a></li>
      </ul>
    </nav>

    <section class="content-section">
      <h2 style="margin-bottom: 15px; color: #1f2937; font-size: 18px;">My Interests</h2>
      <p style="font-size: 15px; color: #4b5563; line-height: 1.8;">
        - 알고리즘 문제 풀이 및 코딩 테스트 (Programmers)<a href="https://programmers.co.kr/?locale=ko" target="_blank" style="color: #6366f1; text-decoration: underline;">💻</a><br>
        - 러닝 & 산책 🏃‍♂️🌿<br>
        - 맛집 탐방🍲<br>
        - 음악 및 콘서트 감상🎵
      </p>
    </section>
  </div>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const btn = document.getElementById('darkModeBtn');
      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('darkMode', 'on');
        btn.innerText = '☀️ 라이트모드';
      } else {
        localStorage.setItem('darkMode', 'off');
        btn.innerText = '🌙 다크모드';
      }
    }

    if (localStorage.getItem('darkMode') === 'on') {
      document.body.classList.add('dark-mode');
      window.onload = function() {
        document.getElementById('darkModeBtn').innerText = '☀️ 라이트모드';
      }
    }
  </script>
</body>
</html>
