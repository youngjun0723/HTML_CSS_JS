<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style type="text/css">
	p {
	font-style: italic;
}
/*.으로 시작하면 class 적용*/
.accent{
	border: 1px solid #000; /*테두리*/
	padding: 5px; /*테두리와 텍스트 사이의 여백*/
}
.bg{
	background-color: #add; 
}
</style>
<title>제목입력</title>
</head>
<body>
<h1 class="accent bg">블루베리와 황산화 효능</h1>
<p class="bg">블루베리는 항산화제인 안토시아닌과 폴리페놀을 다량 포함하고 있습니다.</p>
<p>매사츄세츠 보스톤에 있는 USDA 노화에 관한 인류 영양 연구센터 (the USDA Human Nutrition Research Center on Aging) 의 
자료에 의하면 블루베리는 과일 중에서 가장 항산화 작용이 뛰어난 과일이라고 합니다.</p>
</body>
</html>
