<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<style>
  /* 기본 스타일 초기화 및 웹 폰트 적용 */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Noto Sans KR', sans-serif;
  }

  body {
    background-color: #f4f7f6;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 0;
  }

  .form-container {
    background: #ffffff;
    width: 100%;
    max-width: 550px;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
  }

  h1 {
    font-size: 24px;
    color: #333;
    margin-bottom: 24px;
    text-align: center;
    font-weight: 700;
    border-bottom: 2px solid #5c7cfa;
    padding-bottom: 10px;
  }

  fieldset {
    border: none;
  }

  legend {
    display: none;
  }

  ul {
    list-style: none;
  }

  li {
    margin-bottom: 20px;
  }

  /* 라벨 스타일 */
  label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #495057;
    margin-bottom: 8px;
  }

  /* 입력창과 버튼을 가로로 배치하기 위한 헬퍼 클래스 */
  .input-with-btn {
    display: flex;
    gap: 8px;
  }

  .input-with-btn input {
    flex: 1; /* 입력창이 남은 공간을 모두 차지하도록 설정 */
  }

  /* 입력창 공통 스타일 */
  input[type="text"],
  input[type="password"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  select {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #dee2e6;
    border-radius: 6px;
    font-size: 14px;
    color: #495057;
    transition: all 0.2s ease;
    outline: none;
  }

  /* 포커스 되었을 때 효과 */
  input:focus, select:focus {
    border-color: #5c7cfa;
    box-shadow: 0 0 0 3px rgba(92, 124, 250, 0.15);
  }

  /* 인라인 보조 버튼 스타일 (중복체크, 우편번호 찾기) */
  .sub-btn {
    padding: 0 16px;
    background-color: #e9ecef;
    color: #495057;
    border: 1.5px solid #dee2e6;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap; /* 텍스트가 줄바꿈되지 않도록 설정 */
    transition: all 0.2s ease;
  }

  .sub-btn:hover {
    background-color: #dee2e6;
    color: #212529;
  }

  /* 안내 메시지 스타일 */
  .help-text {
    display: block;
    font-size: 12px;
    color: #868e96;
    margin-top: 5px;
  }

  /* 라디오 및 체크박스 레이아웃 */
  .radio-group, .checkbox-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    padding: 5px 0;
  }

  .radio-group label, .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 400;
    cursor: pointer;
    margin-bottom: 0;
  }

  .radio-group input, .checkbox-group input {
    width: 16px;
    height: 16px;
    accent-color: #5c7cfa;
  }

  /* 하단 전송/취소 버튼 영역 스타일 */
  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 30px;
  }

  input[type="submit"],
  input[type="reset"] {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background-color 0.2s ease;
  }

  input[type="submit"] {
    background-color: #5c7cfa;
    color: white;
  }

  input[type="submit"]:hover {
    background-color: #4263eb;
  }

  input[type="reset"] {
    background-color: #f1f3f5;
    color: #495057;
  }

  input[type="reset"]:hover {
    background-color: #e9ecef;
  }
</style>
</head>
<body>

<div class="form-container">
  <h1>회원가입</h1>
  <form action="#" method="post">
    <fieldset>
      <legend>회원 정보 입력</legend>
      <ul>
        <li>
          <label for="user_id">아이디</label>
          <div class="input-with-btn">
            <input type="text" id="user_id" required placeholder="아이디를 입력해 주세요.">
            <button type="button" class="sub-btn">중복체크</button>
          </div>
          <span class="help-text">영문 소문자, 숫자 조합 4~12자</span>
        </li>
        
        <li>
          <label for="user_pw">비밀번호</label>
          <input type="password" id="user_pw" required placeholder="영문, 숫자 포함 8자 이상" autofocus>
        </li>
        
        <li>
          <label for="user_pw_confirm">비밀번호 확인</label>
          <input type="password" id="user_pw_confirm" required placeholder="비밀번호를 한번 더 입력해 주세요.">
        </li>
        
        <li>
          <label for="user_name">이름</label>
          <input type="text" id="user_name" required placeholder="실명을 입력해 주세요.">
        </li>
        
        <li>
          <label>성별</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="M" checked> 남성</label>
            <label><input type="radio" name="gender" value="F"> 여성</label>
          </div>
        </li>
        
        <li>
          <label for="birth">생년월일</label>
          <input type="date" id="birth" required>
        </li>
        
        <li>
          <label for="mail">Email</label>
          <input type="email" id="mail" required placeholder="example@email.com">
        </li>
        
        <li>
          <label for="zip_code">우편번호</label>
          <div class="input-with-btn">
            <input type="text" id="zip_code" required placeholder="우편번호">
            <button type="button" class="sub-btn">우편번호 찾기</button>
          </div>
        </li>
        
        <li>
          <label for="addr">주소</label>
          <input type="text" id="addr" required placeholder="기본 주소 및 상세 주소를 입력해 주세요.">
        </li>
        
        <li>
          <label>취미</label>
          <div class="checkbox-group">
            <label><input type="checkbox" name="hobby" value="sports"> 운동</label>
            <label><input type="checkbox" name="hobby" value="reading"> 독서</label>
            <label><input type="checkbox" name="hobby" value="music"> 음악감상</label>
            <label><input type="checkbox" name="hobby" value="travel"> 여행</label>
            <label><input type="checkbox" name="hobby" value="driver"> 드라이브</label>
          </div>
        </li>
        
        <li>
          <label for="job">직업</label>
          <select id="job" required>
            <option value="" disabled selected>직업을 선택해 주세요</option>
            <option value="student">학생</option>
            <option value="officer">회사원</option>
            <option value="freelancer">프리랜서</option>
            <option value="business">자영업</option>
            <option value="etc">기타</option>
          </select>
        </li>
      </ul>
    </fieldset>
    
    <div class="btn-group">
      <input type="submit" value="회원가입">
      <input type="reset" value="재작성">
    </div>
  </form>
</div>

</body>
</html>
