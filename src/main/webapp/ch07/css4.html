<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style type="text/css">
	
	ul{
		list-style: none;
		display: flex;
	}
	
	li{
		border: 1px solid #222;
		padding: 10px 20px;
		margin-right: 10px;
	}
	
	a{
		text-decoration: none;
	}
	
	/* link: 아직 방문하지 않은 기본 상태, 
	   visited: 사용자가 방문한 적이 있는 상태,
	   hover: 링크 위에 마우스 커서를 올렸을 때의 상태*/
	
	a:link, a:visited, a:hover {
		color: #222;
}
</style>
<!-- 외부 라이브러리 CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">
<title>제목입력</title>
</head>
<body>
	<nav>
		<ul>
			<li class="fa-solid fa-house"><a href="#">메뉴1</a></li>
			<li class="fa-brands fa-facebook"><a>메뉴2</a></li>
			<li class="fa-brands fa-github"><a>메뉴3</a></li>
		</ul>
	</nav>
</body>
</html>
