<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<form>
	<fieldset>
		<legend>신청과목</legend>
		<p>이 달에 신청할 과목을 선택하세요 (1과목만 선택 가능)</p>
		<label><input type="radio" name="subject" value="speaking" checked>회화</label>
		<label><input type="radio" name="subject" value="grammer" >문법</label>
		<label><input type="radio" name="subject" value="writing" >작문</label>
	</fieldset>
	<fieldset>
		<legend>메일링</legend>
		<p>메일로 받고 싶은 뉴스 주제를 선택해 주세요(복수 선택 가능)</p>
		<label><input type="checkbox" name="mailling" value="news" checked >해외 단신</label>
		<label><input type="checkbox" name="mailling" value="dialog" checked >5분 회화</label>
		<label><input type="checkbox" name="mailling" value="pops" checked >모닝 팝스</label>
	</fieldset>
</form>
</body>
</html>
