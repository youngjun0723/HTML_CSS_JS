<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type="text/javascript">
	a = '10';
	b  = '10';
	document.write(a +b  + "<br>");

	c = window.parseInt(a);
	d = parseInt(b);
	// 숫자 형태의 문자를 숫자 타입으로 변형
	document.write(c+d);
	
	// 사칙 연산자 + % -> 오칙 연산자
	let userNumber = prompt("숫자를 입력하세요")
	if(userNumber % 3 == 0) {
		alert("3의 배수입니다.");
	}
	else {
		alert("3의 배수가 아닙니다.")
	}
	let answer = userNumber % 3 == 0 ? "3의 배수입니다." : "3의 배수가 아닙니다.";
	document.write(answer);
</script>
<title>제목입력</title>
</head>
<body>

</body>
</html>
