<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<script type="text/javascript">
	let one = prompt("50미만의 숫자를 입력하세요");
	let two = prompt("50미만의 숫자를 입력하세요");
	// if는 선택문이고, 괄호 안에는 반드시 true/false가 들어와야함.
	//괄호 내부의 값이 true이면 if절 {}이 실행 false면 실행x
	if(one < 10 || two < 10) {
		alert("숫자 2개 중에 최소 한 개는 10 미만이다.");
	}
	else {
		alert("숫자 2개 중에 10 미만인 수는 없음.");		
	}
	
	one = prompt("50미만의 숫자를 입력하세요");
	two = prompt("50미만의 숫자를 입력하세요");
	if(one < 50 && two < 50) {
		alert("숫자 2개 모두 50미만이다.");
	}
	else {
		alert("조건에 맞지 않는 숫자가 있음.");
	}
</script>
</body>
</html>
