<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<script type="text/javascript">
	
	function greeting() {
		var userName = prompt("이름을 입력하세요.");
		document.write("안녕하세요. <span class = 'accent'>");
		document.write(userName + "</span>님!");
	}
	greeting();
	// 즉시 함수 실행: JQueryW
	
</script>
</body>
</html>
