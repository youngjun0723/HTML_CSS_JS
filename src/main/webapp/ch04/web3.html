<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<h2>상품 구성</h2>
<!-- table > tr > td(th) -->
<table border="1">
	<caption>선물용과 가정용 상품 구성</caption>
	<thead>
		<tr>
		<!-- th는 td에서 중앙정렬과 bold 추가 -->
		<th>용도</th>
		<th>중량</th>
		<th>갯수</th>
		<th>가격</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td>선물용</td>
			<td>3kg</td>
			<td>11~16과</td>
			<td>35,000원</td>
		</tr>
		<tr>
			<td>선물용</td>
			<td>5kg</td>
			<td>18~26과</td>
			<td>52,000원</td>
		</tr>
		<tr>
			<td>가정용</td>
			<td>3kg</td>
			<td>11~16과</td>
			<td>30,000원</td>
		</tr>
		<tr>
			<td> 가정용</td>
			<td>5kg</td>
			<td>18~26개</td>
			<td>47,000원</td>
		</tr>
	</tbody>
</table><p>

<table border="1">
	<thead>
		<tr>
		<!-- th는 td에서 중앙정렬과 bold 추가 -->
		<th>용도</th>
		<th>중량</th>
		<th>갯수</th>
		<th>가격</th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td rowspan="2">선물용</td>
			<td>3kg</td>
			<td>11~16과</td>
			<td>35,000원</td>
		</tr>
		<tr>
			<td>5kg</td>
			<td>18~26과</td>
			<td>52,000원</td>
		</tr>
		<tr>
			<td rowspan="2">가정용</td>
			<td>3kg</td>
			<td>11~16과</td>
			<td>30,000원</td>
		</tr>
		<tr>
			<td>5kg</td>
			<td>18~26개</td>
			<td>47,000원</td>
		</tr>
	</tbody>
</table><p>

<table border="1">
	<tr align="center">
		<td width="100">1</td>
		<td width="100">2</td>
		<td width="100">3</td>
	</tr>
	<tr align="center">
		<td>4</td>
		<td colspan="2">5</td>
	</tr>
	<tr align="center">
		<td colspan="3">7</td>
	</tr>
</table>
</body>
</html>
