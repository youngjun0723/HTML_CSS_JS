<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<form>
	<label>참여인원<small>(최대10명)</small></label>
	<input type="number" value="1" min="0" max="10" step="1">
	<label>지원물품<small>(1인당 5개)</small></label>
	<input type="number" value="1" min="0" max="50"step="5">
</form><p>
<h2>소리 조절하기</h2>
<input type="range" value="20" min="1" max="100" step="1" 
oninput="document.getElementById('vol').innerText = this.value">
<span id="vol">20</span>
</body>
</html>
