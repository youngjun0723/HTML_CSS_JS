<!-- frm1.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type ="text/javascript">
	function loginChk(){
		//alert("보이나요?")
		if(document.frm.id.value=="") {
			alert("아이디를 입력하세요");
			document.frm.id.focus();
			return;
		}
		if(document.frm.pwd.value=="") {
			alert("비밀번호를 입력하세요");
			document.frm.pwd.focus();
			return;
		}
		// 서버에 제출
		document.frm.submit();
	}	
</script>
<title>제목입력</title>
</head>
<body>
<!-- id와 pwd를 frm.html에서 보내면 frm_data.jsp가 받음 -->
<form name="frm" action="frm_data.jsp">
id: <input type="text" name="id", value="aaa"><br>
pwd: <input type="password" name="pwd", value="1234"><br>
<input type="submit" value="로그인"><br>
<input type="button" onclick="loginChk()" value="로그인2"><br>
</form>
</body>
</html>
