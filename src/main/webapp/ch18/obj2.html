<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>제목입력</title>
</head>
<body>
<script type="text/javascript">
	// 배열: Array 클래스로 배열 객체 생성
	var season = ["봄", "여름", "가을", "겨울"];
	document.write(season[0] + "<br>");
	
	for(i = 0; i < season.length; i++) {
		// &nbsp; << 공백 만들기
		document.write(season[i] + "&nbsp;&nbsp;");
	}
	document.write("<br>");
	
	var nums = [1,2,3];
	var chars = ["a", "b", "c", "d"];
	// 두 개의 배열을 합치기
	var numChar = nums.concat(chars);
	document.write(numChar + "<br>");
	
	// 새로운 배열 요소 추가
	nums.push(4,5,6,7);
	document.write(chars.pop() + " : " + chars.shift());
</script>
</body>
</html>
