<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 실력 평가 - 프로필 카드</title>
  <link rel="stylesheet" href="css/test.css">
</head>
<body>

  <div class="card-container">
    <div class="profile-card">
      <div class="card-header">
        <img src="https://picsum.photos/150" alt="프로필 이미지" class="profile-img">
      </div>
      <div class="card-body">
        <h2 class="user-name">홍길동</h2>
        <p class="user-role">Frontend Developer</p>
        <p class="user-bio">배움과 기록을 좋아하는 개발자입니다. 세상에 이로운 가치를 더하는 인터페이스를 만듭니다.</p>
      </div>
      <div class="card-footer">
        <button class="btn btn-primary">팔로우</button>
        <button class="btn btn-secondary">메시지</button>
      </div>
    </div>
  </div>

</body>
</html>
